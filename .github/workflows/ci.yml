name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read          # least privilege: CI can read code, nothing else

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
